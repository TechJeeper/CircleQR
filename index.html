<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round QR Code Generator - Print Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-color: #2a2a3e;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --button-hover: #b4befe;
            --accent-green: #a6e3a1;
            --green-hover: #89dceb;
            --text-muted: #bac2de;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background-color: var(--panel-color);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--button-hover);
            text-decoration: underline;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #45475a;
            border-radius: 6px;
            background: #181825;
            color: #fff;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            background: #181825;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .slider-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .slider-group label {
            font-weight: bold;
            font-size: 0.9rem;
            flex: 1;
        }

        .slider-group input[type="range"] {
            flex: 2;
            cursor: pointer;
        }

        .slider-group span {
            display: inline-block;
            width: 30px;
            text-align: right;
            font-weight: bold;
            color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #11111b;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        .btn-stl {
            background-color: var(--accent-green);
            width: 100%;
            margin-top: 10px;
        }

        .btn-stl:hover {
            background-color: var(--green-hover);
        }

        /* Checkerboard background to demonstrate transparency */
        .preview-wrapper {
            margin: 20px auto;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #ffffff;
        }

        svg {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .actions {
            margin-top: 15px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Round QR Generator</h2>
        <p class="description">
            The perfect tool to generate a seamless, 3D-printable round QR code for your <a href="https://MakerChip.app" target="_blank">MakerChip</a>!
        </p>

        <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)" value="https://example.com" />
        
        <div class="controls">
            <div class="slider-group">
                <label for="noiseInput">Noise Size:</label>
                <input type="range" id="noiseInput" min="1" max="5" value="2" oninput="updateControls()">
                <span id="noiseVal">2</span>
            </div>
            <div class="slider-group">
                <label for="borderInput">Border Width:</label>
                <input type="range" id="borderInput" min="0" max="5" value="2" oninput="updateControls()">
                <span id="borderVal">2</span>
            </div>
        </div>

        <button onclick="generateQR()">Generate QR Image</button>

        <div id="outputContainer" style="display: none;">
            <div class="preview-wrapper" id="svgPreview"></div>
            <div class="actions">
                <button onclick="downloadSVG()">Download SVG</button>
                <button onclick="downloadPNG()">Download PNG</button>
                <button class="btn-stl" onclick="downloadSTL()">Download STL (1mm Thick)</button>
            </div>
        </div>
    </div>

    <div class="footer">
        Created by <a href="https://techjeeper.com" target="_blank">TechJeeper Designs</a>
    </div>

    <script>
        let currentSvgData = "";
        let currentCanvas = null;
        let currentStlData = { modules: [], border: null };

        function updateControls() {
            document.getElementById('noiseVal').innerText = document.getElementById('noiseInput').value;
            document.getElementById('borderVal').innerText = document.getElementById('borderInput').value;
            if(document.getElementById('outputContainer').style.display !== 'none') {
                generateQR();
            }
        }

        function generateQR() {
            try {
                const url = document.getElementById('urlInput').value.trim() || 'https://example.com';
                const noiseChunkSize = parseInt(document.getElementById('noiseInput').value, 10);
                const borderWidth = parseInt(document.getElementById('borderInput').value, 10);

                const qr = qrcode(0, 'M'); 
                qr.addData(url);
                qr.make();

                const qrSize = qr.getModuleCount();
                const coreSize = qrSize; 
                const padding = Math.max(1, borderWidth);
                const radius = Math.ceil((coreSize * Math.sqrt(2)) / 2) + padding; 
                const diameter = radius * 2;
                const center = radius;
                const offset = Math.floor((diameter - coreSize) / 2);

                let pathData = "";
                const cellSize = 10; 

                const canvas = document.createElement('canvas');
                canvas.width = diameter * cellSize;
                canvas.height = diameter * cellSize;
                const ctx = canvas.getContext('2d');
                
                const noiseMap = {};
                
                // Reset STL tracking data
                currentStlData = { modules: [], border: null };

                for (let y = 0; y < diameter; y++) {
                    for (let x = 0; x < diameter; x++) {
                        
                        let isDark = false;
                        const qx = x - offset;
                        const qy = y - offset;

                        if (qx >= 0 && qx < qrSize && qy >= 0 && qy < qrSize) {
                            isDark = qr.isDark(qy, qx);
                        } else {
                            const d1 = Math.hypot(x - center, y - center);
                            const d2 = Math.hypot(x + 1 - center, y - center);
                            const d3 = Math.hypot(x - center, y + 1 - center);
                            const d4 = Math.hypot(x + 1 - center, y + 1 - center);
                            const maxDist = Math.max(d1, d2, d3, d4);
                            const limit = borderWidth > 0 ? (radius - borderWidth / 2) : radius;

                            if (maxDist <= limit) {
                                const chunkX = Math.floor(x / noiseChunkSize);
                                const chunkY = Math.floor(y / noiseChunkSize);
                                const chunkKey = `${chunkX},${chunkY}`;
                                
                                if (noiseMap[chunkKey] === undefined) {
                                    noiseMap[chunkKey] = Math.random() > 0.5;
                                }
                                isDark = noiseMap[chunkKey];
                            }
                        }

                        if (isDark) {
                            pathData += `M${x * cellSize},${y * cellSize} h${cellSize} v${cellSize} h-${cellSize} Z `;
                            ctx.fillStyle = "#000000";
                            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                            
                            // Save geometry for the STL exporter
                            currentStlData.modules.push({x: x, y: y});
                        }
                    }
                }

                let borderSvg = "";
                if (borderWidth > 0) {
                    const ringCenterPx = center * cellSize;
                    const ringRadiusPx = (radius - borderWidth / 2) * cellSize;
                    const ringStrokeWidthPx = borderWidth * cellSize;

                    ctx.beginPath();
                    ctx.arc(ringCenterPx, ringCenterPx, ringRadiusPx, 0, Math.PI * 2);
                    ctx.lineWidth = ringStrokeWidthPx;
                    ctx.strokeStyle = "#000000";
                    ctx.stroke();

                    borderSvg = `<circle cx="${ringCenterPx}" cy="${ringCenterPx}" r="${ringRadiusPx}" fill="none" stroke="#000000" stroke-width="${ringStrokeWidthPx}" />`;
                    
                    // Save border parameters for STL
                    currentStlData.border = {
                        cx: center,
                        cy: center,
                        rInner: radius - borderWidth,
                        rOuter: radius
                    };
                }

                // Changed width/height to 100% to fix mobile SVG zoom bug
                currentSvgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${diameter * cellSize} ${diameter * cellSize}" width="100%" height="100%">
                    <path fill="#000000" d="${pathData}" />
                    ${borderSvg}
                </svg>`;

                document.getElementById('svgPreview').innerHTML = currentSvgData;
                document.getElementById('outputContainer').style.display = 'block';
                currentCanvas = canvas;
                
            } catch (error) {
                alert("Oops! A generation error occurred: " + error.message);
                console.error(error);
            }
        }

        function downloadSVG() {
            if (!currentSvgData) return;
            const blob = new Blob([currentSvgData], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'round-qr-print.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function downloadPNG() {
            if (!currentCanvas) return;
            const a = document.createElement('a');
            a.href = currentCanvas.toDataURL("image/png");
            a.download = 'round-qr-print.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // --- Custom Client-Side STL Generator ---
        function downloadSTL() {
            if (!currentStlData || currentStlData.modules.length === 0) return;
            
            // Generate ASCII STL file structure
            let stlString = "solid RoundQR\n";
            
            // Helper to write a triangle
            function addFacet(v1, v2, v3) {
                stlString += `facet normal 0 0 0\nouter loop\nvertex ${v1[0]} ${v1[1]} ${v1[2]}\nvertex ${v2[0]} ${v2[1]} ${v2[2]}\nvertex ${v3[0]} ${v3[1]} ${v3[2]}\nendloop\nendfacet\n`;
            }

            // Helper to generate a 1mm thick 3D cube from a 2D grid square
            function addCube(x, y, size, zHeight) {
                const x2 = x + size, y2 = y + size;
                // Top
                addFacet([x, y, zHeight], [x2, y, zHeight], [x2, y2, zHeight]);
                addFacet([x, y, zHeight], [x2, y2, zHeight], [x, y2, zHeight]);
                // Bottom
                addFacet([x, y, 0], [x2, y2, 0], [x2, y, 0]);
                addFacet([x, y, 0], [x, y2, 0], [x2, y2, 0]);
                // Front
                addFacet([x, y2, 0], [x2, y2, 0], [x2, y2, zHeight]);
                addFacet([x, y2, 0], [x2, y2, zHeight], [x, y2, zHeight]);
                // Back
                addFacet([x, y, 0], [x2, y, zHeight], [x2, y, 0]);
                addFacet([x, y, 0], [x, y, zHeight], [x2, y, zHeight]);
                // Left
                addFacet([x, y, 0], [x, y2, zHeight], [x, y2, 0]);
                addFacet([x, y, 0], [x, y, zHeight], [x, y2, zHeight]);
                // Right
                addFacet([x2, y, 0], [x2, y2, 0], [x2, y2, zHeight]);
                addFacet([x2, y, 0], [x2, y2, zHeight], [x2, y, zHeight]);
            }

            // 1. Generate geometry for all QR blocks (1mm x 1mm x 1mm)
            currentStlData.modules.forEach(m => addCube(m.x, m.y, 1, 1));

            // 2. Generate geometry for the smooth outer border (if present)
            if (currentStlData.border) {
                const b = currentStlData.border;
                const segs = 72; // Smoothness of the circle
                for(let i = 0; i < segs; i++) {
                    const a1 = (i / segs) * Math.PI * 2;
                    const a2 = ((i + 1) / segs) * Math.PI * 2;
                    
                    const x1i = b.cx + Math.cos(a1) * b.rInner, y1i = b.cy + Math.sin(a1) * b.rInner;
                    const x1o = b.cx + Math.cos(a1) * b.rOuter, y1o = b.cy + Math.sin(a1) * b.rOuter;
                    const x2i = b.cx + Math.cos(a2) * b.rInner, y2i = b.cy + Math.sin(a2) * b.rInner;
                    const x2o = b.cx + Math.cos(a2) * b.rOuter, y2o = b.cy + Math.sin(a2) * b.rOuter;

                    // Top
                    addFacet([x1i, y1i, 1], [x1o, y1o, 1], [x2o, y2o, 1]);
                    addFacet([x1i, y1i, 1], [x2o, y2o, 1], [x2i, y2i, 1]);
                    // Bottom
                    addFacet([x1i, y1i, 0], [x2o, y2o, 0], [x1o, y1o, 0]);
                    addFacet([x1i, y1i, 0], [x2i, y2i, 0], [x2o, y2o, 0]);
                    // Inner Wall
                    addFacet([x1i, y1i, 0], [x1i, y1i, 1], [x2i, y2i, 1]);
                    addFacet([x1i, y1i, 0], [x2i, y2i, 1], [x2i, y2i, 0]);
                    // Outer Wall
                    addFacet([x1o, y1o, 0], [x2o, y2o, 0], [x2o, y2o, 1]);
                    addFacet([x1o, y1o, 0], [x2o, y2o, 1], [x1o, y1o, 1]);
                }
            }
            
            stlString += "endsolid RoundQR\n";
            
            // Trigger browser download for the text payload
            const blob = new Blob([stlString], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'round-qr-print.stl';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.onload = generateQR;
    </script>
</body>
</html>
