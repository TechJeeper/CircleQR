<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round QR Code Generator - Print Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-color: #2a2a3e;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --button-hover: #b4befe;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background-color: var(--panel-color);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #45475a;
            border-radius: 6px;
            background: #181825;
            color: #fff;
            font-size: 1rem;
        }

        button {
            background-color: var(--accent-color);
            color: #11111b;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        /* Checkerboard background to demonstrate transparency */
        .preview-wrapper {
            margin: 20px auto;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #ffffff;
        }

        svg {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .actions {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Round QR Generator (3D Print Optimized)</h2>
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)" value="https://example.com" />
        <br>
        <button onclick="generateQR()">Generate</button>

        <div id="outputContainer" style="display: none;">
            <div class="preview-wrapper" id="svgPreview"></div>
            <div class="actions">
                <button onclick="downloadSVG()">Download SVG</button>
                <button onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>
    </div>

    <script>
        let currentSvgData = "";
        let currentCanvas = null;

        function generateQR() {
            try {
                const url = document.getElementById('urlInput').value.trim() || 'https://example.com';

                // 1. Generate the core QR code matrix (Medium error correction for blockier output)
                const qr = qrcode(0, 'M'); 
                qr.addData(url);
                qr.make();

                const qrSize = qr.getModuleCount();
                const coreSize = qrSize; // No quiet zone

                // 2. Calculate bounds for the surrounding circle
                const radius = Math.ceil((coreSize * Math.sqrt(2)) / 2) + 1; 
                const diameter = radius * 2;
                const center = radius;
                const offset = Math.floor((diameter - coreSize) / 2);

                let pathData = "";
                const cellSize = 10; 

                // Setup hidden canvas for PNG export
                const canvas = document.createElement('canvas');
                canvas.width = diameter * cellSize;
                canvas.height = diameter * cellSize;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#000000"; 

                // 3. Dictionary to store our 2x2 random chunks securely
                const noiseMap = {};

                // 4. Iterate over the circular grid
                for (let y = 0; y < diameter; y++) {
                    for (let x = 0; x < diameter; x++) {
                        
                        const dx = x + 0.5 - center;
                        const dy = y + 0.5 - center;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist <= radius) {
                            let isDark = false;

                            const qx = x - offset;
                            const qy = y - offset;

                            // Check if we are inside the core QR code boundary
                            if (qx >= 0 && qx < qrSize && qy >= 0 && qy < qrSize) {
                                isDark = qr.isDark(qy, qx);
                            } else {
                                // We are outside the core. Safely calculate our 2x2 chunky noise
                                const chunkX = Math.floor(x / 2);
                                const chunkY = Math.floor(y / 2);
                                const chunkKey = `${chunkX},${chunkY}`;
                                
                                // If this chunk hasn't been randomized yet, roll the dice (50% chance)
                                if (noiseMap[chunkKey] === undefined) {
                                    noiseMap[chunkKey] = Math.random() > 0.5;
                                }
                                
                                isDark = noiseMap[chunkKey];
                            }

                            // If the module should be drawn, add it to the SVG path and Canvas
                            if (isDark) {
                                pathData += `M${x * cellSize},${y * cellSize} h${cellSize} v${cellSize} h-${cellSize} Z `;
                                ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                            }
                        }
                    }
                }

                // 5. Render outputs
                currentSvgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${diameter * cellSize} ${diameter * cellSize}" width="250" height="250">
                    <path fill="#000000" d="${pathData}" />
                </svg>`;

                document.getElementById('svgPreview').innerHTML = currentSvgData;
                document.getElementById('outputContainer').style.display = 'block';
                currentCanvas = canvas;
                
            } catch (error) {
                // Catch any silent failures and show them
                alert("Oops! A generation error occurred: " + error.message);
                console.error(error);
            }
        }

        // Generate default on load
        window.onload = generateQR;
    </script>
</body>
</html>
