<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-color: #2a2a3e;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --button-hover: #b4befe;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background-color: var(--panel-color);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #45475a;
            border-radius: 6px;
            background: #181825;
            color: #fff;
            font-size: 1rem;
        }

        button {
            background-color: var(--accent-color);
            color: #11111b;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        /* Checkerboard background to demonstrate transparency */
        .preview-wrapper {
            margin: 20px auto;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #ffffff;
        }

        svg {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .actions {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Round QR Code Generator</h2>
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)" value="https://example.com" />
        <br>
        <button onclick="generateQR()">Generate</button>

        <div id="outputContainer" style="display: none;">
            <div class="preview-wrapper" id="svgPreview"></div>
            <div class="actions">
                <button onclick="downloadSVG()">Download SVG</button>
                <button onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>
    </div>
